name: Bug Report
description: Report a bug
title: "[Bug] "
labels: ["bug"]
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Runtime SDK
        - Function Kits
        - Docs / Notes
        - Other
    validations:
      required: true
  - type: textarea
    id: what_happened
    attributes:
      label: What happened?
      description: Describe the bug and what you expected.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Provide minimal steps or a minimal repo/sample.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / Screenshots
      description: Paste relevant logs (please redact secrets/PII).
      render: text
    validations:
      required: false

